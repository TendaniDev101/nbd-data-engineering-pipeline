dq_flag_priority:
  - NULL_REQUIRED
  - TYPE_MISMATCH
  - DATE_FORMAT
  - CURRENCY_VARIANT
  - ORPHANED_ACCOUNT
  - DUPLICATE_DEDUPED

rules:
  NULL_REQUIRED:
    enabled: true
    issue_type: null_required
    handling_action: EXCLUDED_NULL_PK
    denominator: transactions_raw
    fields:
      - transaction_id
      - account_id
      - transaction_date_raw
      - transaction_time
      - transaction_type
      - amount_raw
      - currency_raw
      - channel

  TYPE_MISMATCH:
    enabled: true
    issue_type: type_mismatch
    handling_action: CAST_TO_DECIMAL
    denominator: transactions_raw
    amount_raw_field: amount_raw
    amount_cast_field: amount
    timestamp_field: transaction_timestamp
    timestamp_source_fields:
      - transaction_date
      - transaction_time
    allowed_transaction_types:
      - DEBIT
      - CREDIT
      - FEE
      - REVERSAL
    allowed_channels:
      - POS
      - APP
      - ATM
      - EFT
      - USSD
      - INTERNAL

  DATE_FORMAT:
    enabled: true
    issue_type: date_format_inconsistency
    handling_action: NORMALISED_DATE
    denominator: transactions_raw
    source_field: transaction_date_raw
    parsed_field: transaction_date

  CURRENCY_VARIANT:
    enabled: true
    issue_type: currency_variants
    handling_action: NORMALISED_CURRENCY
    denominator: transactions_raw
    source_field: currency_raw
    target_value: ZAR

  ORPHANED_ACCOUNT:
    enabled: true
    issue_type: orphaned_transactions
    handling_action: QUARANTINED
    denominator: transactions_raw
    reference_present_field: _valid_account_id

  DUPLICATE_DEDUPED:
    enabled: true
    issue_type: duplicate_transactions
    handling_action: DEDUPLICATED_KEEP_FIRST
    denominator: transactions_raw
    duplicate_count_field: _dup_count

account_null_required:
  issue_code: NULL_REQUIRED_ACCOUNT
  issue_type: null_account_id
  handling_action: EXCLUDED_NULL_PK
  denominator: accounts_raw
  key_field: account_id
